    <!-- Keep canonical / social URLs correct on whatever origin this is served from. -->
    <script src="/seo-canonical.js" defer></script>

    <!-- Structured data: the application -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "file-sharer",
        "url": "https://file-sharer.4oli.com/",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any (progressive web app)",
        "description": "A free, end-to-end encrypted progressive web app for sharing text and files up to 50 MB between your own devices. The server is zero-knowledge and only ever stores ciphertext.",
        "browserRequirements": "Requires JavaScript and a modern browser",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "featureList": [
          "End-to-end encryption (AES-256)",
          "Zero-knowledge server",
          "Cross-device sync",
          "QR-code device pairing",
          "Files up to 50 MB",
          "Installable, offline-capable PWA"
        ]
      }
    </script>

    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is file-sharer really end-to-end encrypted?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. A symmetric AES-256 group key is created on your first device and shared only with devices you link. Messages and files are encrypted before they leave your device, and the server only ever handles ciphertext."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need an account or email?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. There are no accounts, no email and no passwords. You create a space on one device and link your other devices to it with a QR code."
            }
          },
          {
            "@type": "Question",
            "name": "Can you read my messages or files?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The server is zero-knowledge by design: it stores only ciphertext, public keys and SHA-256 hashes. Without the keys that live on your devices, the data is unreadable."
            }
          },
          {
            "@type": "Question",
            "name": "What is the maximum file size?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can share files up to 50 MB. Files are encrypted on your device, delivered to your other devices, then removed from the server automatically."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work offline?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. file-sharer is a progressive web app you can install. Your message history is stored locally, so it remains available even when you are offline."
            }
          },
          {
            "@type": "Question",
            "name": "How do I add another device?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "On the new device choose to link to an existing space to get a QR code, then scan it from a device already in the space. The encryption keys are exchanged securely during pairing."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <main style="max-width: 640px; margin: 10vh auto; padding: 0 24px; font-family: system-ui, sans-serif; line-height: 1.6;">
        <h1>file-sharer — encrypted file &amp; text sharing for your devices</h1>
        <p>
          file-sharer is a free, end-to-end encrypted progressive web app for sharing text and files
          (up to 50&nbsp;MB) between your own phone, laptop and tablet. The server is zero-knowledge
          and only ever stores ciphertext — your data never leaves your devices unencrypted.
        </p>
        <p><strong>Please enable JavaScript to create or open your encrypted space.</strong></p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
