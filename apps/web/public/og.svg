<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="file-sharer — end-to-end encrypted sharing across your devices">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d11"/>
      <stop offset="1" stop-color="#15131f"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8c8cf3"/>
      <stop offset="1" stop-color="#5b5bd6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#5b5bd6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5b5bd6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(80, 80)">
    <rect width="92" height="92" rx="26" fill="url(#mark)"/>
    <path d="M46 20l28 11v23c0 20-12.5 34.5-28 41-15.5-6.5-28-21-28-41V31z" fill="#fff"/>
    <path d="M35 46l8 8 14-16.5" fill="none" stroke="#5b5bd6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="200" y="148" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="30" letter-spacing="8" fill="#f3f3f5" font-weight="600">FILE·SHARER</text>

  <text x="80" y="320" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="72" font-weight="700" fill="#f3f3f5" letter-spacing="-2">Share files &amp; text between</text>
  <text x="80" y="402" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="72" font-weight="700" fill="#f3f3f5" letter-spacing="-2">your devices, <tspan fill="#8c8cf3">privately</tspan>.</text>

  <text x="80" y="480" font-family="system-ui, sans-serif" font-size="30" fill="#b8b8c0">End-to-end encrypted · Zero-knowledge · No account</text>

  <g transform="translate(80, 528)" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#85858f" letter-spacing="2">
    <circle cx="6" cy="14" r="6" fill="#3dd68c"/>
    <text x="24" y="21">AES-256</text>
    <circle cx="206" cy="14" r="6" fill="#3dd68c"/>
    <text x="224" y="21">FILES UP TO 50 MB</text>
    <circle cx="556" cy="14" r="6" fill="#3dd68c"/>
    <text x="574" y="21">WORKS OFFLINE</text>
  </g>
</svg>
